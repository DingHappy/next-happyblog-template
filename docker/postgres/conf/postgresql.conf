# ============================================
# PostgreSQL 优化配置
# 适用于 2GB-4GB 内存的服务器
# ============================================

# 连接设置
listen_addresses = '*'
max_connections = 100

# 内存配置（根据服务器内存调整）
shared_buffers = 512MB               # 建议设置为总内存的 25%
effective_cache_size = 1536MB        # 建议设置为总内存的 75%
maintenance_work_mem = 128MB          # 维护操作的内存
work_mem = 16MB                       # 每个排序操作的内存
wal_buffers = 16MB                    # WAL 缓冲区

# 检查点配置
checkpoint_completion_target = 0.9
wal_writer_delay = 200ms

# 日志配置
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_min_duration_statement = 1000      # 记录慢查询（毫秒）
log_checkpoints = on
log_connections = on
log_disconnections = on

# 统计信息
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000
pg_stat_statements.track_utility = off

# 自动清理配置
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# 写入优化
fsync = on
full_page_writes = on

# 优化器配置
random_page_cost = 1.1                # SSD 磁盘设置为 1.1
effective_io_concurrency = 200        # SSD 磁盘设置

# 时区
timezone = 'Asia/Shanghai'
log_timezone = 'Asia/Shanghai'

# 字符集
client_encoding = UTF8

# 语言配置
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

default_text_search_config = 'pg_catalog.english'