services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-blog}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blogpassword}
      POSTGRES_DB: ${DB_NAME:-blog_db}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-blog} -d ${DB_NAME:-blog_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        BUILD_SHA: ${BUILD_SHA:-unknown}
    container_name: blog-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      DATABASE_URL: ${DATABASE_URL:-postgresql://blog:blogpassword@postgres:5432/blog_db?schema=public}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blog-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: blog-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - ./public/uploads:/var/www/uploads:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - blog-network
    profiles:
      - full

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        BUILD_SHA: ${BUILD_SHA:-unknown}
    container_name: blog-migrate
    profiles:
      - tools
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      DATABASE_URL: ${DATABASE_URL:-postgresql://blog:blogpassword@postgres:5432/blog_db?schema=public}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-管理员}
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  nginx_logs:
    driver: local
